[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

# ── RPC Endpoints ──────────────────────────────────────────────
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
base    = "${BASE_RPC_URL}"
local   = "http://127.0.0.1:8545"

# ── Etherscan Verification ─────────────────────────────────────
# Foundry ≥1.5 handles Etherscan V2 natively via --chain flag.
# Set ETHERSCAN_API_KEY in your .env file.

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
base    = { key = "${ETHERSCAN_API_KEY}", chain = 8453 }
